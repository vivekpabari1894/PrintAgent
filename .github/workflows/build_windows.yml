name: Build Windows Agent

on: [push]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests pystray Pillow Cython setuptools wheel pywin32
    - name: Download SumatraPDF (Portable 64-bit)
      run: |
        Invoke-WebRequest -Uri "https://www.sumatrapdfreader.org/dl/rel/3.5.2/SumatraPDF-3.5.2-64.zip" -OutFile "SumatraPDF.zip"
        Expand-Archive -Path "SumatraPDF.zip" -DestinationPath "."
        Move-Item "SumatraPDF-3.5.2-64.exe" "SumatraPDF.exe"
    - name: Compile Agent with Cython
      run: |
        # Generate C file and compile to ID (In-place) -> agent.pyd
        cythonize -i -3 agent.py
        # Verify pyd exists
        dir *.pyd
    - name: Generate EXE Icon
      run: python gen_icon.py
    - name: Generate Version Info
      run: python gen_version_info.py

    - name: Get Agent Version
      id: vars
      shell: bash
      run: |
        VERSION=$(grep 'AGENT_VERSION =' agent.py | cut -d '"' -f 2)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Using Version: $VERSION"

    - name: Build EXE (Bootloader + Compiled Logic)
      run: |
        pyinstaller --noconsole --onefile --icon "agent_icon.ico" --version-file version_info.txt --name "OdooPrintAgent_v${{ steps.vars.outputs.version }}" --add-binary "SumatraPDF.exe;." --add-data "agent_logo.png;." bootloader.py
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OdooPrintAgent-Binary
        path: dist/OdooPrintAgent_v${{ steps.vars.outputs.version }}.exe

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/OdooPrintAgent_v${{ steps.vars.outputs.version }}.exe
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}




