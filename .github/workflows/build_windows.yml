name: Build Windows Agent

on: [push]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests pystray Pillow Cython setuptools wheel pywin32
    - name: Download SumatraPDF
      run: |
        Invoke-WebRequest -Uri "https://www.sumatrapdfreader.org/dl/rel/3.5.2/SumatraPDF-3.5.2-64.exe" -OutFile "SumatraPDF.exe"
    - name: Compile Agent with Cython
      run: |
        # Generate C file and compile to ID (In-place) -> agent.pyd
        cythonize -i -3 agent.py
        # Verify pyd exists
        dir *.pyd
    - name: Generate EXE Icon
      run: python -c "from PIL import Image; img = Image.open('agent_logo.png').convert('RGBA'); img.save('agent_icon.ico', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])"
    - name: Generate Version Info
      run: python gen_version_info.py

    - name: Build EXE (Bootloader + Compiled Logic)
      # We target bootloader.py, which imports the compiled 'agent'.
      # PyInstaller picks up agent.pyd automatically.
      run: pyinstaller --noconsole --onefile --icon "agent_icon.ico" --version-file version_info.txt --name "OdooPrintAgent" --add-binary "SumatraPDF.exe;." --add-data "agent_logo.png;." bootloader.py
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OdooPrintAgent-Binary
        path: dist/OdooPrintAgent.exe
    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/OdooPrintAgent.exe
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}




